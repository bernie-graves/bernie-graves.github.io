name: Upload artifact
on:
  push:
    branches: [ main ]
jobs:
  upload:
    name: upload artifact
    runs-on: ubuntu-latest
    steps:
    - name: upload
      uses: actions/upload-artifact@v2
      with:
        name: my-artifact
        path: https://github.com/bernie-graves/bernie-graves.github.io # or path/to/artifact
